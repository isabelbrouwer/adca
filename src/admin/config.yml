backend:
  name: github
  repo: isabelbrouwer/adca
  branch: main
  auth_type: pkce
  app_id: GITHUB_OAUTH_APP_CLIENT_ID    # TODO: vervangen door Client ID van GitHub OAuth App

local_backend: true

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Blogposts"
    label_singular: "Blogpost"
    folder: "src/blog"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    fields:
      - label: "Titel"
        name: "title"
        widget: "string"
      - label: "Korte omschrijving"
        name: "description"
        widget: "string"
        hint: "Wordt getoond in de bloglijst en als SEO-omschrijving."
      - label: "Publicatiedatum"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD-MM-YYYY"
        time_format: false
      - label: "Categorie"
        name: "category"
        widget: "string"
        required: false
        hint: "Bijv. Contractbeheer, Legal tech, Due diligence"
      - label: "Inhoud"
        name: "body"
        widget: "markdown"
